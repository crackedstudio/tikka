# High-availability oracle deployment.
# - 2 replicas spread across nodes via PodAntiAffinity
# - Bull queue locks ensure only one replica processes each job
# - Readiness probe hits /health before traffic is routed
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikka-oracle
  namespace: tikka
  labels:
    app: tikka-oracle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tikka-oracle
  template:
    metadata:
      labels:
        app: tikka-oracle
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: tikka-oracle
                topologyKey: kubernetes.io/hostname
      volumes:
        - name: age-key
          secret:
            secretName: tikka-oracle-age-key
            defaultMode: 0400
      containers:
        - name: tikka-oracle
          image: ghcr.io/crackedstudio/tikka-oracle:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: tikka-oracle-config
            - secretRef:
                name: tikka-oracle-secrets
          env:
            - name: SOPS_AGE_KEY_FILE
              value: /run/secrets/age.key
          volumeMounts:
            - name: age-key
              mountPath: /run/secrets
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
