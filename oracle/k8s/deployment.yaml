apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikka-oracle
  labels:
    app: tikka-oracle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tikka-oracle
  template:
    metadata:
      labels:
        app: tikka-oracle
    spec:
      containers:
      - name: tikka-oracle
        image: tikka-oracle:latest
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
