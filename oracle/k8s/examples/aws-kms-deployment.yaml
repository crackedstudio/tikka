# Example Kubernetes deployment using AWS KMS with IRSA
# (IAM Roles for Service Accounts)

apiVersion: v1
kind: ServiceAccount
metadata:
  name: oracle-service
  namespace: production
  annotations:
    # IRSA: Associate IAM role with service account
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/oracle-kms-role

---
apiVersion: v1
kind: Secret
metadata:
  name: oracle-kms-config
  namespace: production
type: Opaque
stringData:
  key-provider: "aws-kms"
  aws-region: "us-east-1"
  # Store KMS key ID in secret for easy rotation
  aws-kms-key-id: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle
  namespace: production
  labels:
    app: oracle
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oracle
  template:
    metadata:
      labels:
        app: oracle
        version: v1
    spec:
      serviceAccountName: oracle-service
      
      containers:
      - name: oracle
        image: your-registry/oracle:latest
        imagePullPolicy: Always
        
        env:
        # Key provider configuration
        - name: KEY_PROVIDER
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: key-provider
        
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: aws-region
        
        - name: AWS_KMS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: aws-kms-key-id
        
        # Other oracle configuration
        - name: SOROBAN_RPC_URL
          value: "https://soroban-mainnet.stellar.org"
        
        - name: RAFFLE_CONTRACT_ID
          valueFrom:
            configMapKeyRef:
              name: oracle-config
              key: contract-id
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
