# Example Kubernetes deployment using Google Cloud KMS with Workload Identity

apiVersion: v1
kind: ServiceAccount
metadata:
  name: oracle-service
  namespace: production
  annotations:
    # Workload Identity: Associate GCP service account
    iam.gke.io/gcp-service-account: oracle-signer@my-project.iam.gserviceaccount.com

---
apiVersion: v1
kind: Secret
metadata:
  name: oracle-kms-config
  namespace: production
type: Opaque
stringData:
  key-provider: "gcp-kms"
  gcp-project-id: "my-project"
  gcp-location-id: "global"
  gcp-key-ring-id: "oracle-keys"
  gcp-key-id: "oracle-signing-key"
  gcp-key-version: "1"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle
  namespace: production
  labels:
    app: oracle
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oracle
  template:
    metadata:
      labels:
        app: oracle
        version: v1
    spec:
      serviceAccountName: oracle-service
      
      containers:
      - name: oracle
        image: your-registry/oracle:latest
        imagePullPolicy: Always
        
        env:
        # Key provider configuration
        - name: KEY_PROVIDER
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: key-provider
        
        - name: GCP_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: gcp-project-id
        
        - name: GCP_LOCATION_ID
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: gcp-location-id
        
        - name: GCP_KEY_RING_ID
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: gcp-key-ring-id
        
        - name: GCP_KEY_ID
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: gcp-key-id
        
        - name: GCP_KEY_VERSION
          valueFrom:
            secretKeyRef:
              name: oracle-kms-config
              key: gcp-key-version
        
        # Other oracle configuration
        - name: SOROBAN_RPC_URL
          value: "https://soroban-mainnet.stellar.org"
        
        - name: RAFFLE_CONTRACT_ID
          valueFrom:
            configMapKeyRef:
              name: oracle-config
              key: contract-id
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
# Workload Identity Binding (create separately in GCP)
# gcloud iam service-accounts add-iam-policy-binding \
#   oracle-signer@my-project.iam.gserviceaccount.com \
#   --role roles/iam.workloadIdentityUser \
#   --member "serviceAccount:my-project.svc.id.goog[production/oracle-service]"
