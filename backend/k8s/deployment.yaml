apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikka-backend
  labels:
    app: tikka-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tikka-backend
  template:
    metadata:
      labels:
        app: tikka-backend
    spec:
      containers:
      - name: tikka-backend
        image: tikka-backend:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
