apiVersion: apps/v1
kind: Deployment
metadata:
  name: tikka-indexer
  labels:
    app: tikka-indexer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tikka-indexer
  template:
    metadata:
      labels:
        app: tikka-indexer
    spec:
      containers:
        - name: tikka-indexer
          image: ghcr.io/crackedstudio/tikka-indexer:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: tikka-indexer-config
            - secretRef:
                name: tikka-indexer-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
