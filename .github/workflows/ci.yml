name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  # Client package
  client:
    name: Client - Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: false
      
      - name: Run unit tests
        run: npm run test:unit
        continue-on-error: false
      
      - name: Build
        run: npm run build
        continue-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 7

  # SDK package
  sdk:
    name: SDK - Lint, Test, Build, Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: false
      
      - name: Run tests
        run: npm run test
        continue-on-error: false
      
      - name: Build
        run: npm run build
        continue-on-error: false
      
      - name: Generate docs
        run: npm run docs
        continue-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: sdk/dist
          retention-days: 7

  # Backend package
  backend:
    name: Backend - Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: false
      
      - name: Run tests (mocked)
        run: npm run test
        env:
          NODE_ENV: test
        continue-on-error: false
      
      - name: Build
        run: npm run build
        continue-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 7

  # Indexer package
  indexer:
    name: Indexer - Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./indexer
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: indexer/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: false
      
      - name: Run unit tests (network tests excluded)
        run: npm run test
        env:
          NODE_ENV: test
        continue-on-error: false
      
      - name: Build
        run: npm run build
        continue-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: indexer-build
          path: indexer/dist
          retention-days: 7

  # Oracle package
  oracle:
    name: Oracle - Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./oracle
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: oracle/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
        continue-on-error: false
      
      - name: Run tests (mocked)
        run: npm run test
        env:
          NODE_ENV: test
        continue-on-error: false
      
      - name: Build
        run: npm run build
        continue-on-error: false
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oracle-build
          path: oracle/dist
          retention-days: 7

  # Summary job - fails if any package fails
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [client, sdk, backend, indexer, oracle]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.client.result }}" != "success" ]] || \
             [[ "${{ needs.sdk.result }}" != "success" ]] || \
             [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.indexer.result }}" != "success" ]] || \
             [[ "${{ needs.oracle.result }}" != "success" ]]; then
            echo "❌ One or more packages failed CI checks"
            exit 1
          fi
          echo "✅ All packages passed CI checks"
