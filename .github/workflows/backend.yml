name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/backend.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter tikka-backend run build

      - name: Test
        run: pnpm --filter tikka-backend run test -- --ci

      - name: Validate OpenAPI Spec
        run: pnpm --filter tikka-backend run validate:openapi

  deploy:
    name: Deploy Backend
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy to Railway (deploy hook)
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL != '' }}
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Skip deploy when hook is missing
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL == '' }}
        run: echo "No RAILWAY_DEPLOY_HOOK_URL configured. Skipping deploy."
